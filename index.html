<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Domain Expansion - OpenCV 🔥</title>
    <script src="https://docs.opencv.org/4.5.5/opencv.js" onload="onOpenCvReady();" async></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
            z-index: 1;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ffff;
            z-index: 1000;
            font-size: 20px;
            text-shadow: 0 0 15px #00ffff;
            background: rgba(0,0,0,0.85);
            padding: 25px;
            border-radius: 20px;
            border: 3px solid #00ffff;
            max-width: 350px;
        }

        #status {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 20px #00ffff;
            z-index: 1001;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            border: 2px solid #00ffff;
        }

        #domainTitle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #fff;
            text-align: center;
            opacity: 0;
            z-index: 1002;
            text-shadow: 0 0 40px #00ffff;
            pointer-events: none;
            line-height: 1.1;
        }

        .pulse {
            animation: pulseGlow 1.5s infinite;
        }

        .domain-active {
            animation: domainExplosion 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0%, 100% { 
                box-shadow: 0 0 20px #00ffff;
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 50px #00ffff, 0 0 80px #ff00ff;
                transform: scale(1.05);
            }
        }

        @keyframes domainExplosion {
            0% { 
                text-shadow: 0 0 40px #00ffff;
                transform: translate(-50%, -50%) scale(1);
            }
            100% { 
                text-shadow: 0 0 80px #00ffff, 0 0 120px #ff00ff;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        .hand-ready {
            color: #00ff88 !important;
            text-shadow: 0 0 30px #00ff88 !important;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div id="controls">
            <div style="font-size: 24px; margin-bottom: 15px;">🤲 <strong>SUPER EASY!</strong></div>
            <div>✅ Camera permission do</div>
            <div>✅ <strong>Haath center me le jao</strong></div>
            <div>✅ <strong>2 seconds hold karo</strong></div>
            <div style="font-size: 28px; color: #ffaa00; margin-top: 10px;">
                ✨ <strong>DOMAIN EXPAND!</strong>
            </div>
        </div>
        
        <div id="status">Camera loading...</div>
        <div id="domainTitle">
            <div style="font-size: 32px;">DOMAIN EXPANSION</div>
            <div style="font-size: 42px; color: #00ffff;">無量空処</div>
            <div style="font-size: 28px;">UNLIMITED VOID</div>
        </div>
    </div>

    <script>
        let cvReady = false;
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let status = document.getElementById('status');
        let domainTitle = document.getElementById('domainTitle');
        
        let handDetectedTime = 0;
        let domainActive = false;
        let particles = [];
        let time = 0;
        let handHoldTimer = 0;
        
        function onOpenCvReady() {
            console.log('✅ OpenCV Ready!');
            cvReady = true;
            initCamera();
        }

        async function initCamera() {
            try {
                status.textContent = 'Camera access...';
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: 640, 
                        height: 480, 
                        facingMode: 'user' 
                    }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    status.textContent = 'Haath center me lao 👋';
                    detectHands();
                };
            } catch (err) {
                status.textContent = '❌ Camera permission denied!';
            }
        }

        function detectHands() {
            if (!cvReady || !video.videoWidth || domainActive) {
                requestAnimationFrame(detectHands);
                return;
            }
            
            let src = cv.imread(video);
            let gray = new cv.Mat();
            let skinMask = new cv.Mat();
            let kernel = cv.Mat.ones(5, 5, cv.CV_8U);
            let handContour = new cv.Mat();
            
            // Skin color detection (YCrCb)
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            
            // Simple skin detection using HSV
            let hsv = new cv.Mat();
            cv.cvtColor(src, hsv, cv.COLOR_RGBA2HSV);
            
            let lowerSkin = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 20, 70, 0]);
            let upperSkin = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [20, 255, 255, 255]);
            cv.inRange(hsv, lowerSkin, upperSkin, skinMask);
            
            // Morphological operations
            cv.morphologyEx(skinMask, skinMask, cv.MORPH_CLOSE, kernel);
            cv.morphologyEx(skinMask, skinMask, cv.MORPH_OPEN, kernel);
            
            // Find largest contour
            cv.findContours(skinMask, handContour, new cv.Mat(), cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            
            let handFound = false;
            let handCenter = { x: 0, y: 0 };
            
            for (let i = 0; i < handContour.size(); i++) {
                let contour = handContour.get(i);
                let area = cv.contourArea(contour);
                
                if (area > 3000 && area < 60000) { // Hand-sized contour
                    let rect = cv.boundingRect(contour);
                    handCenter.x = rect.x + rect.width / 2;
                    handCenter.y = rect.y + rect.height / 2;
                    
                    // Scale to canvas size
                    handCenter.x *= (canvas.width / src.cols);
                    handCenter.y *= (canvas.height / src.rows);
                    
                    handFound = true;
                    break;
                }
            }
            
            // Hand detection logic
            if (handFound) {
                handDetectedTime = Date.now();
                
                // Check if hand is in center (within 30% of screen)
                let centerX = canvas.width / 2;
                let centerY = canvas.height / 2;
                let distFromCenter = Math.sqrt(
                    Math.pow(handCenter.x - centerX, 2) + 
                    Math.pow(handCenter.y - centerY, 2)
                );
                
                let centerThreshold = Math.min(canvas.width, canvas.height) * 0.3;
                
                if (distFromCenter < centerThreshold) {
                    handHoldTimer += 16; // ~60fps
                    status.textContent = `✅ PERFECT! ${Math.ceil((2000 - handHoldTimer)/1000)}s hold...`;
                    status.classList.add('pulse');
                    
                    // Draw center target
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Draw hand position
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.arc(handCenter.x, handCenter.y, 20, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (handHoldTimer > 2000) { // 2 seconds
                        activateDomain();
                    }
                } else {
                    handHoldTimer = 0;
                    status.textContent = '🎯 Center me lao';
                    status.classList.remove('pulse');
                }
            } else {
                handHoldTimer = 0;
                handDetectedTime = 0;
                status.textContent = '👋 Haath dikhao';
                status.classList.remove('pulse');
            }
            
            // Cleanup
            src.delete(); gray.delete(); skinMask.delete(); 
            kernel.delete(); handContour.delete(); hsv.delete();
            lowerSkin.delete(); upperSkin.delete();
            
            drawParticles();
            requestAnimationFrame(detectHands);
        }

        function activateDomain() {
            domainActive = true;
            domainTitle.style.opacity = '1';
            domainTitle.classList.add('domain-active');
            status.textContent = '🌌 DOMAIN EXPANSION ACTIVATED! 🌌';
            status.style.color = '#00ffff';
            
            // EPIC particle explosion
            for (let i = 0; i < 5000; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1,
                    maxLife: 1,
                    decay: 0.012,
                    hue: 240 + Math.random() * 80,
                    size: Math.random() * 8 + 3,
                    glow: Math.random() * 50 + 20
                });
            }
        }

        function drawParticles() {
            time++;
            
            // Dark trail effect
            ctx.fillStyle = domainActive ? 'rgba(5, 0, 25, 0.2)' : 'rgba(0, 0, 15, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.97;
                p.vy *= 0.97;
                p.life -= p.decay;
                p.hue += 3;
                return p.life > 0;
            });
            
            // Draw particles with glow
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                
                // Multi-layer glow
                for (let i = 0; i < 4; i++) {
                    ctx.shadowColor = `hsla(${p.hue}, 100%, 70%, ${p.life * 0.6})`;
                    ctx.shadowBlur = p.glow + i * 15;
                    
                    let gradSize = p.size * (4 - i);
                    let gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gradSize);
                    gradient.addColorStop(0, `hsla(${p.hue}, 100%, 85%, ${p.life * (1 - i * 0.2)})`);
                    gradient.addColorStop(0.6, `hsla(${p.hue}, 80%, 60%, ${p.life * 0.4})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, gradSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });
            
            // Void rings effect
            if (domainActive && time % 3 === 0) {
                let cx = canvas.width / 2;
                let cy = canvas.height / 2;
                
                for (let i = 0; i < 4; i++) {
                    let radius = 120 + i * 100 + Math.sin(time * 0.03 + i) * 60;
                    ctx.strokeStyle = `rgba(0, 255, 255, ${0.4 - i * 0.1})`;
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
